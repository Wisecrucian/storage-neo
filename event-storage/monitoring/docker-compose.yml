version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: event-storage-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: event-storage-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_DATABASE_WAL: "true"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: event-storage-kafka-exporter
    command:
      - "--kafka.server=host.docker.internal:9092"
    ports:
      - "9308:9308"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  clickhouse-exporter:
    image: f1yegor/clickhouse-exporter:latest
    container_name: event-storage-clickhouse-exporter
    environment:
      CLICKHOUSE_URL: "http://host.docker.internal:8123"
    ports:
      - "9116:9116"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  grafana_data:
    driver: local

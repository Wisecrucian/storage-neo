global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "event-storage-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081", "host.docker.internal:8082"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "clickhouse-exporter"
    static_configs:
      - targets: ["clickhouse-exporter:9116"]
